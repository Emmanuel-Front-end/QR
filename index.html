<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QR Counter · Escaneo ultrarrápido continuo</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #f0f4f8; padding: 1rem; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: white; border-radius: 1.5rem; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 1.8rem; background: linear-gradient(135deg, #3b82f6, #8b5cf6); background-clip: text; -webkit-background-clip: text; color: transparent; }
    button { background: #3b82f6; color: white; border: none; padding: 0.8rem 1.2rem; border-radius: 2rem; font-weight: bold; width: 100%; cursor: pointer; margin-top: 0.5rem; transition: transform 0.05s linear; }
    button:active { transform: scale(0.97); }
    .counter { font-size: 2.5rem; font-weight: 800; text-align: center; color: #3b82f6; }
    video { width: 100%; border-radius: 1rem; background: #000; aspect-ratio: 4/3; object-fit: cover; }
    .error-box { background: #fee2e2; color: #991b1b; padding: 0.8rem; border-radius: 1rem; margin: 1rem 0; font-size: 0.85rem; }
    .history-item { background: #f8fafc; border-radius: 1rem; padding: 0.7rem; margin-bottom: 0.6rem; display: flex; justify-content: space-between; align-items: center; }
    .delete-btn { background: #ef4444; color: white; border: none; border-radius: 2rem; padding: 0.3rem 0.8rem; cursor: pointer; width: auto; margin: 0; }
    .badge { background: #3b82f6; color: white; border-radius: 2rem; padding: 0.2rem 0.6rem; font-size: 0.7rem; display: inline-block; }
    .scan-status { text-align: center; font-size: 0.8rem; margin-top: 0.5rem; color: #475569; }
  </style>
</head>
<body>
<div class="container">
  <h1>⚡ QR Counter · Modo Rápido</h1>
  <div class="card">
    <button id="openCameraBtn">📸 Escanear QR (continuo ultrarrápido)</button>
    <div id="cameraAdvice" class="error-box" style="display: none;"></div>
    <hr>
    <details>
      <summary>✏️ Ingresar QR manual</summary>
      <textarea id="manualText" rows="2" placeholder="Pega el contenido aquí..."></textarea>
      <button id="saveManualBtn">➕ Guardar</button>
    </details>
  </div>
  <div class="card">
    <div style="text-align: center;">📊 TOTAL ESCANEOS</div>
    <div class="counter" id="totalCount">0</div>
    <div><strong>Último QR:</strong></div>
    <div id="lastContent">—</div>
    <div id="lastDate" style="font-size: 0.8rem;"></div>
  </div>
  <div class="card">
    <h3>📜 Historial</h3>
    <input type="text" id="searchHistory" placeholder="🔍 Buscar..." style="width:100%; padding:0.5rem; border-radius:1rem; border:1px solid #ccc; margin-bottom:0.5rem;">
    <div id="historyList"></div>
    <button id="exportCsvBtn">📎 Exportar CSV</button>
  </div>
</div>

<!-- Modal cámara -->
<div id="cameraModal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:2000; flex-direction:column; align-items:center; justify-content:center;">
  <video id="video" autoplay playsinline muted style="width:90%; max-width:500px; border-radius:1rem;"></video>
  <div class="scan-status" style="color:white;">🔍 Escaneando a máxima velocidad...</div>
  <div style="display: flex; gap: 1rem; margin-top: 1rem;">
    <button id="closeCameraBtn" style="background:#ef4444;">❌ Cerrar</button>
    <button id="retryCameraBtn" style="background:#3b82f6;">🔄 Reintentar</button>
  </div>
  <div id="cameraErrorMsg" style="color:#ffaaaa; background:#330000; padding:0.8rem; border-radius:1rem; margin-top:1rem; width:90%; max-width:500px; text-align:center; display:none;"></div>
</div>

<script>
  // ---------- INDEXEDDB ----------
  const DB_NAME = 'QRFastDB';
  let db = null;
  let lastSavedContent = null;

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = (e) => {
        const store = e.target.result.createObjectStore('scans', { keyPath: 'id', autoIncrement: true });
        store.createIndex('byTime', 'timestamp');
      };
      req.onsuccess = () => { db = req.result; resolve(db); };
      req.onerror = () => reject(req.error);
    });
  }

  async function getAllScans() {
    return new Promise((resolve) => {
      const tx = db.transaction('scans', 'readonly');
      const store = tx.objectStore('scans');
      const index = store.index('byTime');
      const req = index.openCursor(null, 'prev');
      const results = [];
      req.onsuccess = (e) => {
        const c = e.target.result;
        if (c) { results.push(c.value); c.continue(); }
        else resolve(results);
      };
    });
  }

  async function addScan(content) {
    if (!content || content === lastSavedContent) return false;
    const scans = await getAllScans();
    const nextNum = scans.length ? Math.max(...scans.map(s => s.num || 0)) + 1 : 1;
    const newScan = {
      content: content.trim(),
      timestamp: new Date().toISOString(),
      num: nextNum
    };
    return new Promise((resolve) => {
      const tx = db.transaction('scans', 'readwrite');
      const req = tx.objectStore('scans').add(newScan);
      req.onsuccess = () => {
        lastSavedContent = content;
        refreshUI();
        // Feedback rápido: beep y vibración
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.value = 880;
          gain.gain.value = 0.2;
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
          osc.stop(audioCtx.currentTime + 0.1);
          audioCtx.resume();
        } catch(e) {}
        if (navigator.vibrate) navigator.vibrate(50);
        resolve(true);
      };
      req.onerror = () => resolve(false);
    });
  }

  async function deleteScan(id) {
    const tx = db.transaction('scans', 'readwrite');
    tx.objectStore('scans').delete(id);
    await tx.complete;
    refreshUI();
  }

  async function refreshUI() {
    const scans = await getAllScans();
    document.getElementById('totalCount').innerText = scans.length;
    if (scans.length) {
      const last = scans[0];
      document.getElementById('lastContent').innerHTML = `<strong>${escapeHtml(last.content)}</strong>`;
      document.getElementById('lastDate').innerText = new Date(last.timestamp).toLocaleString();
    } else {
      document.getElementById('lastContent').innerText = '—';
      document.getElementById('lastDate').innerText = '';
    }
    const searchTerm = document.getElementById('searchHistory')?.value.toLowerCase() || '';
    let filtered = scans;
    if (searchTerm) filtered = scans.filter(s => s.content.toLowerCase().includes(searchTerm));
    const historyDiv = document.getElementById('historyList');
    if (!filtered.length) { historyDiv.innerHTML = '<div style="padding:1rem; text-align:center;">📭 Sin escaneos</div>'; return; }
    historyDiv.innerHTML = filtered.map(s => `
      <div class="history-item">
        <div><span class="badge">#${s.num}</span> <strong>${escapeHtml(s.content.substring(0, 55))}</strong><br><small>${new Date(s.timestamp).toLocaleString()}</small></div>
        <button class="delete-btn" data-id="${s.id}">🗑️</button>
      </div>
    `).join('');
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (confirm('¿Eliminar este registro?')) await deleteScan(Number(btn.dataset.id));
      });
    });
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

  // ---------- CÁMARA ULTRARRÁPIDA CON BAJA RESOLUCIÓN ----------
  let currentStream = null;
  let scanInterval = null;
  let scanningActive = false;
  const video = document.getElementById('video');
  const modal = document.getElementById('cameraModal');
  const errorMsgDiv = document.getElementById('cameraErrorMsg');

  async function startFastCamera() {
    if (currentStream) stopCamera();
    try {
      // Configurar resolución baja para máxima velocidad (320x240 o similar)
      const constraints = {
        video: {
          facingMode: { exact: 'environment' },
          width: { ideal: 320 },
          height: { ideal: 240 }
        }
      };
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia(constraints);
      } catch (e) {
        // Fallback sin facingMode exacto
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
      }
      currentStream = stream;
      video.srcObject = stream;
      await video.play();
      scanningActive = true;
      errorMsgDiv.style.display = 'none';
      
      // Escaneo con intervalos cortos (50ms) en lugar de requestAnimationFrame para mayor control
      if (scanInterval) clearInterval(scanInterval);
      scanInterval = setInterval(() => {
        if (!scanningActive || video.readyState !== video.HAVE_ENOUGH_DATA || video.videoWidth === 0) return;
        
        // Crear canvas temporal de baja resolución (coincide con el tamaño del video)
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        // jsQR con opciones rápidas
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: "dontInvert",
          greyScaleWeights: { red: 0.3, green: 0.59, blue: 0.11 }
        });
        
        if (code && code.data) {
          const text = code.data;
          if (lastSavedContent !== text) {
            addScan(text);
          }
        }
      }, 30); // ~33 fps, pero sin esperar a la animación, más rápido que requestAnimationFrame en algunos casos
      
    } catch (err) {
      let msg = '';
      if (err.name === 'NotAllowedError') msg = 'Permiso denegado. Habilita la cámara en el candado de la URL.';
      else if (err.name === 'NotFoundError') msg = 'No se encontró cámara. Usa entrada manual.';
      else msg = `Error: ${err.message}. Usa servidor local (localhost) o HTTPS.`;
      errorMsgDiv.innerText = msg;
      errorMsgDiv.style.display = 'block';
      scanningActive = false;
    }
  }

  function stopCamera() {
    scanningActive = false;
    if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }
    video.srcObject = null;
  }

  function openModal() {
    modal.style.display = 'flex';
    startFastCamera();
  }
  function closeModal() { stopCamera(); modal.style.display = 'none'; }

  // ---------- MANUAL Y EXPORTACIÓN ----------
  document.getElementById('saveManualBtn').onclick = async () => {
    const txt = document.getElementById('manualText').value.trim();
    if (!txt) return alert('Ingresa contenido');
    await addScan(txt);
    document.getElementById('manualText').value = '';
  };

  async function exportCSV() {
    const scans = await getAllScans();
    if (!scans.length) { alert('No hay datos'); return; }
    const rows = [['N°', 'Contenido', 'Fecha']];
    scans.forEach(s => rows.push([s.num, s.content, new Date(s.timestamp).toLocaleString()]));
    const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `qr_${Date.now()}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // Detectar si está en file:// y mostrar advertencia
  if (window.location.protocol === 'file:') {
    document.getElementById('cameraAdvice').style.display = 'block';
    document.getElementById('cameraAdvice').innerHTML = '⚠️ Estás abriendo el archivo localmente. La cámara no funcionará. Sirve el archivo con un servidor local (ej: python -m http.server) o usa la entrada manual.';
  }

  window.onload = async () => {
    await openDB();
    await refreshUI();
    document.getElementById('openCameraBtn').onclick = openModal;
    document.getElementById('closeCameraBtn').onclick = closeModal;
    document.getElementById('retryCameraBtn').onclick = () => { startFastCamera(); };
    document.getElementById('exportCsvBtn').onclick = exportCSV;
    document.getElementById('searchHistory').addEventListener('input', () => refreshUI());
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  };
</script>
</body>
</html>
