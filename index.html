<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QR Counter · Cámara + Entrada manual</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui; background: #f0f4f8; padding: 1rem; }
    .card { background: white; border-radius: 1.5rem; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    button { background: #3b82f6; color: white; border: none; padding: 0.8rem 1.2rem; border-radius: 2rem; font-weight: bold; width: 100%; cursor: pointer; margin-top: 0.5rem; }
    .error-box { background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 1rem; margin: 1rem 0; }
    video { width: 100%; border-radius: 1rem; background: black; aspect-ratio: 4/3; }
    input, textarea { width: 100%; padding: 0.7rem; border-radius: 1rem; border: 1px solid #ccc; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div style="max-width: 600px; margin: auto;">
  <h1>📷 QR Counter</h1>
  <div class="card">
    <button id="abrirCamara">📸 Escanear con cámara</button>
    <hr style="margin: 1rem 0;">
    <details>
      <summary>✍️ Ingresar código QR manualmente</summary>
      <textarea id="manualQR" rows="2" placeholder="Pega el contenido del QR aquí..."></textarea>
      <button id="guardarManual">➕ Guardar manual</button>
    </details>
  </div>
  <div class="card">
    <h3>📊 Total escaneos: <span id="total">0</span></h3>
    <h3>🔖 Último QR:</h3>
    <div id="ultimo">—</div>
  </div>
  <div id="historial" class="card"></div>
</div>

<div id="modalCamara" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000; flex-direction:column; align-items:center; justify-content:center;">
  <video id="video" autoplay playsinline muted style="width:90%; max-width:500px; border-radius:1rem;"></video>
  <div style="margin-top:1rem; display:flex; gap:1rem;">
    <button id="cerrarCamara" style="background:#ef4444;">❌ Cerrar</button>
    <button id="reintentarCamara" style="background:#3b82f6;">🔄 Reintentar</button>
  </div>
  <div id="errorCamara" style="color:#ffaaaa; background:#330000; padding:0.8rem; border-radius:1rem; margin-top:1rem; display:none; text-align:center;"></div>
</div>

<script>
  // Base de datos IndexedDB
  const DB_NAME = 'QRManualDB';
  let db = null;
  let lastSaved = null;

  function abrirDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = (e) => {
        const store = e.target.result.createObjectStore('scans', { keyPath: 'id', autoIncrement: true });
        store.createIndex('fecha', 'timestamp');
      };
      req.onsuccess = () => { db = req.result; resolve(db); };
      req.onerror = () => reject(req.error);
    });
  }

  async function obtenerTodos() {
    return new Promise((resolve) => {
      const tx = db.transaction('scans', 'readonly');
      const store = tx.objectStore('scans');
      const index = store.index('fecha');
      const req = index.openCursor(null, 'prev');
      const results = [];
      req.onsuccess = (e) => {
        const c = e.target.result;
        if (c) { results.push(c.value); c.continue(); }
        else resolve(results);
      };
    });
  }

  async function guardarQR(content) {
    if (!content || content === lastSaved) return false;
    const scans = await obtenerTodos();
    const numero = scans.length ? Math.max(...scans.map(s=>s.numero||0)) + 1 : 1;
    const nuevo = {
      content: content.trim(),
      timestamp: new Date().toISOString(),
      numero: numero
    };
    return new Promise((resolve) => {
      const tx = db.transaction('scans', 'readwrite');
      const req = tx.objectStore('scans').add(nuevo);
      req.onsuccess = () => { lastSaved = content; actualizarUI(); resolve(true); };
      req.onerror = () => resolve(false);
    });
  }

  async function eliminar(id) {
    const tx = db.transaction('scans', 'readwrite');
    tx.objectStore('scans').delete(id);
    await tx.complete;
    actualizarUI();
  }

  async function actualizarUI() {
    const scans = await obtenerTodos();
    document.getElementById('total').innerText = scans.length;
    if (scans.length) {
      document.getElementById('ultimo').innerHTML = `<strong>${scans[0].content}</strong><br><small>${new Date(scans[0].timestamp).toLocaleString()}</small>`;
    } else {
      document.getElementById('ultimo').innerText = '—';
    }
    const historialDiv = document.getElementById('historial');
    if (!scans.length) { historialDiv.innerHTML = '<p>📭 Sin escaneos</p>'; return; }
    historialDiv.innerHTML = scans.map(s => `
      <div style="background:#f8fafc; border-radius:1rem; padding:0.6rem; margin-bottom:0.5rem; display:flex; justify-content:space-between;">
        <div><strong>#${s.numero}</strong> ${s.content.substring(0,50)}<br><small>${new Date(s.timestamp).toLocaleString()}</small></div>
        <button onclick="eliminar(${s.id})" style="background:#ef4444; width:auto; padding:0.3rem 0.8rem;">🗑️</button>
      </div>
    `).join('');
  }

  // ---------- CÁMARA CON MANEJO DE PERMISOS ----------
  let streamActivo = null;
  let animFrame = null;
  let escaneando = false;
  const video = document.getElementById('video');
  const modal = document.getElementById('modalCamara');
  const errorDiv = document.getElementById('errorCamara');

  async function iniciarCamara() {
    if (streamActivo) detenerCamara();
    try {
      // Intentar cámara trasera, si falla la frontal
      let constraints = { video: { facingMode: { exact: 'environment' } } };
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia(constraints);
      } catch (e) {
        constraints = { video: true }; // cámara por defecto (frontal o trasera)
        stream = await navigator.mediaDevices.getUserMedia(constraints);
      }
      streamActivo = stream;
      video.srcObject = stream;
      await video.play();
      escaneando = true;
      errorDiv.style.display = 'none';
      bucleEscaneo();
    } catch (err) {
      let mensaje = '';
      if (err.name === 'NotAllowedError') {
        mensaje = '❌ Permiso de cámara denegado. Para solucionarlo:\n\n• Chrome/Edge: Haz clic en el candado 🔒 junto a la URL → Permisos → Cámara → Permitir.\n• Safari: Ajustes → Safari → Cámara → Permitir.\n• Si abres el archivo desde el disco (file://), súbelo a un servidor local (ej: python -m http.server).';
      } else if (err.name === 'NotFoundError') {
        mensaje = '❌ No se detectó ninguna cámara en este dispositivo.';
      } else {
        mensaje = `❌ Error: ${err.message}. Asegúrate de usar HTTPS o localhost.`;
      }
      errorDiv.innerText = mensaje;
      errorDiv.style.display = 'block';
      escaneando = false;
    }
  }

  function detenerCamara() {
    escaneando = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    if (streamActivo) {
      streamActivo.getTracks().forEach(t => t.stop());
      streamActivo = null;
    }
    video.srcObject = null;
  }

  function bucleEscaneo() {
    if (!escaneando) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imgData.data, imgData.width, imgData.height);
      if (code && code.data && (Date.now() - (window.ultimoTiempo || 0) > 200)) {
        window.ultimoTiempo = Date.now();
        const texto = code.data;
        if (lastSaved !== texto) {
          guardarQR(texto);
          if (navigator.vibrate) navigator.vibrate(100);
          // beep simple
          try { new AudioContext().then(ctx => { const o = ctx.createOscillator(); o.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.1); ctx.resume(); }); } catch(e) {}
        }
      }
    }
    animFrame = requestAnimationFrame(bucleEscaneo);
  }

  function abrirModal() { modal.style.display = 'flex'; iniciarCamara(); }
  function cerrarModal() { detenerCamara(); modal.style.display = 'none'; }

  // Guardado manual
  document.getElementById('guardarManual').onclick = async () => {
    const texto = document.getElementById('manualQR').value.trim();
    if (!texto) return alert('Escribe o pega el contenido del QR');
    await guardarQR(texto);
    document.getElementById('manualQR').value = '';
  };

  window.eliminar = eliminar; // para botones onclick

  window.onload = async () => {
    await abrirDB();
    await actualizarUI();
    document.getElementById('abrirCamara').onclick = abrirModal;
    document.getElementById('cerrarCamara').onclick = cerrarModal;
    document.getElementById('reintentarCamara').onclick = () => { iniciarCamara(); };
  };
</script>
</body>
</html>
